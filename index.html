<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Camera Testing & Device Debugger</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 15px; background: #121212; color: #fff; margin: 0; }
    .container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
    
    /* จอกล้องจริง ไม่ผ่าน Canvas แล้ว */
    #video { width: 100%; max-width: 450px; border-radius: 12px; background-color: #000; box-shadow: 0 8px 30px rgba(0,0,0,0.6); display: block; margin: 0 auto; }
    .mirror { transform: scaleX(-1); } /* ใช้กลับด้านเฉพาะกล้องหน้า */
    
    /* แผงควบคุม */
    .btn-group { margin-top: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn { background: #007bff; color: #fff; border: none; padding: 12px 20px; font-size: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-success { background: #28a745; }
    
    /* ช่องเลือกกล้องสำหรับคอม */
    #cameraSelectContainer { margin-top: 10px; display: none; }
    select { background: #333; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 6px; font-size: 14px; width: 100%; max-width: 300px; }
    
    /* กล่องแดชบอร์ดแสดงเวอร์ชันและข้อมูลระบบ */
    .debug-box { max-width: 430px; margin: 20px auto 0 auto; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 12px; text-align: left; font-size: 13px; font-family: monospace; color: #00ff00; }
    .debug-title { font-weight: bold; color: #ffcc00; margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    #status { margin-top: 15px; font-size: 14px; color: #aaa; }
  </style>
</head>
<body>

  <h2>Camera Expert Tester</h2>
  
  <div class="container">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <div id="cameraSelectContainer">
    <label for="videoSource">เลือกกล้องที่ต้องการใช้: </label><br><br>
    <select id="videoSource" onchange="startCamera()"></select>
  </div>
  
  <div class="btn-group">
    <button id="switchBtn" class="btn" onclick="switchCameraMobile()">🔄 สลับกล้อง หน้า/หลัง</button>
    <button class="btn btn-success" onclick="captureAndSend()">📸 ถ่ายรูปส่งไป Google</button>
  </div>
  
  <p id="status">ระบบกำลังเริ่มต้น...</p>

  <div class="debug-box">
    <div class="debug-title">🛠️ DEVICE & SOFTWARE DEBUGGER</div>
    <div>APP VERSION : <span style="color:#fff;">v1.4.0 (No-AI Engine)</span></div>
    <div>DEVICE TYPE : <span id="devType" style="color:#fff;">กำลังตรวจสอบ...</span></div>
    <div>OS/BROWSER  : <span id="devOS" style="color:#fff;">กำลังตรวจสอบ...</span></div>
    <div>ACTIVE CAM  : <span id="devCam" style="color:#fff;">-</span></div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLZpaCK-v7pIoSlu-wDMF1wyYcZJ1D8Ae_iGe_zqDVUqmi89B0D5V9OYBpmmxj9aAehg/exec";

    let videoElement = document.getElementById('video');
    let videoSelect = document.getElementById('videoSource');
    let cameraSelectContainer = document.getElementById('cameraSelectContainer');
    let switchBtn = document.getElementById('switchBtn');
    let statusElement = document.getElementById('status');
    
    let streamRef = null;
    let currentFacingMode = "user"; // มือถือเริ่มที่กล้องหน้าก่อน
    let isMobile = false;

    // 1. ตรวจสอบอุปกรณ์ทันทีที่เปิดเว็บ
    function checkDevice() {
      const ua = navigator.userAgent;
      const devTypeSpan = document.getElementById('devType');
      const devOSSpan = document.getElementById('devOS');
      
      devOSSpan.innerText = ua.substring(0, 60) + "..."; // ตัดข้อความสเปกเครื่องมาโชว์

      // ตรวจสอบว่าเป็นมือถือหรือคอม
      if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)) {
        isMobile = true;
        devTypeSpan.innerText = "📱 SMARTPHONE / TABLET";
        cameraSelectContainer.style.display = "none"; // ซ่อนตลับเลือกกล้องของคอม
        switchBtn.style.display = "inline-block";    // แสดงปุ่มสลับกล้องแบบมือถือ
      } else {
        isMobile = false;
        devTypeSpan.innerText = "💻 COMPUTER / LAPTOP";
        cameraSelectContainer.style.display = "block"; // แสดงตลับเลือกกล้องให้คอมเลือกได้อิสระ
        switchBtn.style.display = "none";             // ซ่อนปุ่มสลับกล้องแบบมือถือ
      }
    }

    // 2. ดึงรายชื่อกล้องทั้งหมด (เฉพาะบนคอมพิวเตอร์)
    function getCameras() {
      if (isMobile) return; // บนมือถือใช้ระบบสลับอัตโนมัติ ไม่ต้องดึงรายชื่อ
      
      navigator.mediaDevices.enumerateDevices()
        .then(devices => {
          videoSelect.innerHTML = ''; // เคลียร์ค่าเก่า
          let count = 1;
          devices.forEach(device => {
            if (device.kind === 'videoinput') {
              const option = document.createElement('option');
              option.value = device.deviceId;
              option.text = device.label || `Camera ${count++}`;
              videoSelect.appendChild(option);
            }
          });
        })
        .catch(err => console.error("ไม่สามารถดึงรายชื่อกล้องได้: ", err));
    }

    // 3. ฟังก์ชันหลักสั่งเปิดกล้อง
    async function startCamera() {
      // เคลียร์สตรีมกล้องเก่าทิ้งแบบเด็ดขาด (แก้ปัญหาจอดำ)
      if (streamRef) {
        streamRef.getTracks().forEach(track => track.stop());
        streamRef = null;
        videoElement.srcObject = null;
      }

      let constraints = { audio: false };

      if (isMobile) {
        // เงื่อนไขสำหรับมือถือ: อ้างอิงตามทิศทาง หน้า หรือ หลัง
        constraints.video = { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } };
        document.getElementById('devCam').innerText = currentFacingMode === "user" ? "FRONT CAMERA (กล้องหน้า)" : "BACK CAMERA (กล้องหลัง)";
        
        // ถ้าเป็นกล้องหน้าให้ทำเอฟเฟกต์กระจกเงา ถ้ากล้องหลังไม่ต้อง
        if (currentFacingMode === "user") {
          videoElement.classList.add('mirror');
        } else {
          videoElement.classList.remove('mirror');
        }
      } else {
        // เงื่อนไขสำหรับคอม: อ้างอิงตาม deviceId ที่เลือกจาก Dropdown
        const videoSource = videoSelect.value;
        constraints.video = { deviceId: videoSource ? { exact: videoSource } : undefined };
        
        // ค้นหาชื่อกล้องที่กำลังเปิดใช้งานมาแสดงในหน้าจอ Debug
        if(videoSelect.options.length > 0) {
          document.getElementById('devCam').innerText = videoSelect.options[videoSelect.selectedIndex].text;
        }
        videoElement.classList.add('mirror'); // คอมพิวเตอร์ส่องหน้าตัวเองตลอดเวลา
      }

      try {
        statusElement.innerText = "กำลังเชื่อมต่อกล้อง...";
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        streamRef = stream;
        videoElement.srcObject = stream;
        await videoElement.play();
        
        statusElement.innerText = "กล้องทำงานปกติ";
        statusElement.style.color = "#28a745";
      } catch (err) {
        statusElement.innerText = "เออร์เรอร์ระบบกล้อง: " + err.name + "\n" + err.message;
        statusElement.style.color = "#dc3545";
      }
    }

    // 4. ฟังก์ชันสลับกล้องสำหรับมือถือ (หน้า -> หลัง -> หน้า)
    function switchCameraMobile() {
      if (!isMobile) return;
      currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
      statusElement.innerText = "กำลังเปลี่ยนกล้อง...";
      startCamera();
    }

    // 5. ถ่ายรูปจากวิดีโอสด ส่งไป Google Drive
    function captureAndSend() {
      statusElement.innerText = "กำลังบันทึกภาพและส่งไปที่ Google Drive...";
      statusElement.style.color = "#007bff";
      
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      const ctx = canvas.getContext('2d');
      
      // จัดการเรื่องกลับด้านภาพตอนเซฟไฟล์รูปให้ตรงกับหน้าจอ
      if (videoElement.classList.contains('mirror')) {
        ctx.translate(canvas.width, 0);
        scale(-1, 1);
      }
      ctx.drawImage(videoElement, 0, 0);
      
      const base64Image = canvas.toDataURL('image/jpeg');
      const formBody = 'image=' + encodeURIComponent(base64Image);

      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formBody
      })
      .then(() => {
        statusElement.innerText = "📸 สำเร็จ! ภาพถูกส่งเข้า Google Drive เรียบร้อย";
        statusElement.style.color = "#28a745";
      })
      .catch(err => {
        statusElement.innerText = "ส่งข้อมูลล้มเหลว: " + err.message;
        statusElement.style.color = "#dc3545";
      });
    }

    // จุดเริ่มต้นทำงานเมื่อโหลดหน้าเว็บสำเร็จ
    window.onload = async function() {
      checkDevice();
      // ขอสิทธิ์เปิดกล้องครั้งแรกเพื่อกระตุ้นให้บราวเซอร์ยินยอมแสดงรายชื่ออุปกรณ์
      try {
        const initStream = await navigator.mediaDevices.getUserMedia({video: true});
        initStream.getTracks().forEach(track => track.stop()); // ปิดทันทีหลังได้สิทธิ์
        getCameras(); // ดึงรายชื่อกล้อง (ถ้าเป็นคอม)
        setTimeout(startCamera, 300); // เริ่มรันระบบกล้องหลัก
      } catch(e) {
        startCamera();
      }
    }
  </script>
</body>
</html>
