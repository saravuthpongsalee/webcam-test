<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Human Security Tracker - Tracking Tail v5.0</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 10px; background: #121212; color: #fff; margin: 0; }
    .container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
    video { display: none; } 
    canvas { width: 100% !important; height: auto !important; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.7); background-color: #000; }
    
    .counter-dashboard { display: flex; justify-content: space-around; max-width: 470px; margin: 10px auto; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; }
    .counter-item { text-align: center; }
    .counter-item h3 { margin: 0 0 5px 0; font-size: 13px; color: #aaa; }
    .counter-item p { margin: 0; font-size: 32px; font-weight: bold; color: #00e5ff; font-family: monospace; }
    
    .control-panel { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; max-width: 470px; margin: 0 auto; }
    .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
    .btn { background: #007bff; color: #fff; border: none; padding: 12px 18px; font-size: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-success { background: #28a745; }
    .btn-danger { background: #dc3545; }
    
    #cameraSelectContainer { margin-top: 10px; display: none; }
    select { background: #333; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 6px; font-size: 14px; width: 100%; max-width: 300px; }
    
    .debug-box { max-width: 430px; margin: 15px auto 0 auto; background: #131313; border: 1px solid #333; border-radius: 8px; padding: 12px; text-align: left; font-size: 12px; font-family: monospace; color: #00e5ff; line-height: 1.6; }
    #status { margin-top: 10px; font-size: 14px; color: #999; }
  </style>
</head>
<body>

  <h2>AI Airport Security - Human Counter</h2>
  
  <div class="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

  <div class="counter-dashboard">
    <div class="counter-item">
      <h3>🚶‍♂️ ยอดนับคนข้ามเขตทั้งหมด (TOTAL)</h3>
      <p id="humanCountDisplay">0</p>
    </div>
    <div class="counter-item">
      <h3>🆔 จำนวนคนที่อยู่ในจอขณะนี้</h3>
      <p id="trackedObjectsDisplay" style="color: #ffcc00;">0</p>
    </div>
  </div>

  <div class="control-panel">
    <div class="btn-group">
      <button id="switchBtn" class="btn" style="background:#6c757d;" onclick="switchCameraMobile()">🔄 สลับกล้อง หน้า/หลัง</button>
      <button class="btn btn-success" onclick="captureAndSend()">📸 ส่งภาพหลักฐานเข้า Google</button>
      <button class="btn btn-danger" onclick="resetCounter()">🧹 รีเซ็ตระบบนับ</button>
    </div>
    
    <div id="cameraSelectContainer">
      <select id="videoSource" onchange="startCamera()"></select>
    </div>
  </div>
  
  <p id="status">กำลังเตรียมสมองกล AI...</p>

  <div class="debug-box">
    <div style="text-align:center; font-weight:bold; color:#ffcc00; margin-bottom:5px;">🛡️ AIRPORT SECURITY DIAGNOSTICS</div>
    <div>DEVICE MODE     : <span id="devType" style="color:#fff;">-</span></div>
    <div>ACTIVE CAMERA  : <span id="devCam" style="color:#fff;">-</span></div>
    <div>SECURITY CLASS : <span style="color:#fff;">person (คนเดิน / คนวิ่ง)</span></div>
    <div>MOTION TAIL    : <span style="color:#fff;">Active (Max 15 History Points)</span></div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLZpaCK-v7pIoSlu-wDMF1wyYcZJ1D8Ae_iGe_zqDVUqmi89B0D5V9OYBpmmxj9aAehg/exec";

    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let videoSelect = document.getElementById('videoSource');
    let cameraSelectContainer = document.getElementById('cameraSelectContainer');
    let switchBtn = document.getElementById('switchBtn');
    let statusElement = document.getElementById('status');
    
    let streamRef = null;
    let modelSession = null;
    let currentFacingMode = "user"; 
    let isMobile = false;
    
    // --- โครงสร้างระบบสแกนคนข้ามเขต และวาดเส้นหาง (Tracking Tail) ---
    let totalHumanCount = 0;
    let nextObjectID = 1;
    let trackedObjects = []; 
    let countedIDs = new Set(); 
    
    const COUNTING_LINE_Y = 240; // เส้นแบ่งเขตความปลอดภัยกลางจอ
    const TAIL_MAX_LENGTH = 15; // ความยาวของเส้นหาง (เก็บประวัติพิกัดย้อนหลัง 15 เฟรม)

    function checkDevice() {
      const ua = navigator.userAgent;
      if (/Android|iPhone|iPad|iPod/i.test(ua)) {
        isMobile = true;
        document.getElementById('devType').innerText = "📱 MOBILE SYSTEM";
        cameraSelectContainer.style.display = "none";
        switchBtn.style.display = "inline-block";
      } else {
        isMobile = false;
        document.getElementById('devType').innerText = "💻 SECURITY COMPUTER";
        cameraSelectContainer.style.display = "block";
        switchBtn.style.display = "none";
      }
    }

    function getCameras() {
      if (isMobile) return;
      navigator.mediaDevices.enumerateDevices().then(devices => {
        videoSelect.innerHTML = '';
        devices.forEach(device => {
          if (device.kind === 'videoinput') {
            const option = document.createElement('option');
            option.value = device.deviceId;
            option.text = device.label || `Camera ${videoSelect.length + 1}`;
            videoSelect.appendChild(option);
          }
        });
      });
    }

    async function initAI() {
      statusElement.innerText = "กำลังดาวน์โหลดระบบความปลอดภัย Human AI...";
      try {
        await tf.ready();
        modelSession = await cocoSsd.load({ base: 'mobilenet_v2' });
        statusElement.innerText = "ระบบตรวจจับและนับคนพร้อมทำงาน!";
        statusElement.style.color = "#28a745";
        
        await startCamera();
        runInference(); 
        renderLoop();   
      } catch (e) {
        statusElement.innerText = "โหลดโมเดลล้มเหลว: " + e.message;
        startCamera();
        renderLoop();
      }
    }

    async function startCamera() {
      if (streamRef) {
        streamRef.getTracks().forEach(track => track.stop());
        streamRef = null;
        video.srcObject = null;
      }

      let constraints = { audio: false };
      if (isMobile) {
        constraints.video = { facingMode: currentFacingMode, width: 640, height: 480 };
        document.getElementById('devCam').innerText = currentFacingMode === "user" ? "FRONT (กล้องหน้า)" : "BACK (กล้องหลัง)";
      } else {
        const videoSource = videoSelect.value;
        constraints.video = { deviceId: videoSource ? { exact: videoSource } : undefined, width: 640, height: 480 };
        if(videoSelect.options.length > 0) {
          document.getElementById('devCam').innerText = videoSelect.options[videoSelect.selectedIndex].text;
        }
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        streamRef = stream;
        video.srcObject = stream;
        await video.play();
      } catch (err) {
        statusElement.innerText = "กล้องเออร์เรอร์: " + err.message;
      }
    }

    function switchCameraMobile() {
      if (!isMobile) return;
      currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
      startCamera();
    }

    // ⚡ 5. เอนจิ้นติดตามโครงสร้างพิกัด พร้อมบันทึกประวัติเส้นหาง (Motion Path Tracking)
    async function runInference() {
      if (modelSession && video.readyState === video.HAVE_ENOUGH_DATA) {
        try {
          const rawPredictions = await modelSession.detect(video);
          
          // 🛑 เจาะจงคัดกรองเอาเฉพาะ "คน" (person) เท่านั้นตามเงื่อนไขความปลอดภัย
          let currentHumans = rawPredictions.filter(p => p.class === 'person' && p.score > 0.40);
          
          let newTrackedObjects = [];

          for (let p of currentHumans) {
            let [x, y, w, h] = p.bbox;
            let centerX = x + w / 2;
            let centerY = y + h / 2;
            
            let matchedID = null;
            let minDistance = 70; // ขยายรัศมีจับพิกัดสำหรับคนวิ่งความเร็วสูง

            // ค้นหา ID เดิมจากเฟรมที่แล้ว
            let oldRecord = trackedObjects.find(oldObj => {
              let dist = Math.hypot(centerX - oldObj.lastX, centerY - oldObj.lastY);
              return dist < minDistance;
            });

            if (oldRecord) {
              matchedID = oldRecord.id;
            } else {
              matchedID = nextObjectID++;
            }

            // จัดการพิกัดหน้าจอกระจกเงา (Mirror)
            const isMirror = (isMobile && currentFacingMode === "user") || !isMobile;
            let drawX = x;
            let drawCenterX = centerX;
            if (isMirror) { 
              drawX = canvas.width - x - w; 
              drawCenterX = canvas.width - centerX;
            }

            // สร้างหรือดึงประวัติเส้นหางเดิมมาใช้งานต่อ
            let historyPath = [];
            if (oldRecord && oldRecord.path) {
              historyPath = [...oldRecord.path];
            }
            
            // บันทึกพิกัดกึ่งกลางปัจจุบันลงในเส้นหาง
            historyPath.push({ x: drawCenterX, y: centerY });
            
            // ตัดหางทิ้งถ้าขนาดยาวเกินกำหนด (Max 15 จุด)
            if (historyPath.length > TAIL_MAX_LENGTH) {
              historyPath.shift();
            }

            // ตรวจสอบการเดินข้ามเส้นตรวจจับสีแดง
            let hasCrossed = countedIDs.has(matchedID);
            if (oldRecord && !hasCrossed) {
              if ((oldRecord.lastY <= COUNTING_LINE_Y && centerY > COUNTING_LINE_Y) ||
                  (oldRecord.lastY >= COUNTING_LINE_Y && centerY < COUNTING_LINE_Y)) {
                
                totalHumanCount++; 
                countedIDs.add(matchedID); 
                hasCrossed = true;
                
                statusElement.innerText = `🚨 SECURITY ALERT: Target ID ${matchedID} ผ่านเส้นตรวจเช็ก!`;
                statusElement.style.color = "#ffcc00";
              }
            }

            newTrackedObjects.push({
              id: matchedID,
              lastX: centerX,
              lastY: centerY,
              drawX: drawX,
              drawY: y,
              w: w,
              h: h,
              score: p.score,
              path: historyPath // แนบประวัติเส้นหางไปกับตัววัตถุ
            });
          }

          trackedObjects = newTrackedObjects;
          
          document.getElementById('humanCountDisplay').innerText = totalHumanCount;
          document.getElementById('trackedObjectsDisplay').innerText = trackedObjects.length;

        } catch (err) {
          console.error(err);
        }
      }
      setTimeout(runInference, 40); // เพิ่มความเร็วเฟรมเรต AI เพื่อให้หางนิ่งไม่กระตุก
    }

    // 🎬 6. หลูปวาดกราฟิก (ภาพสด + เส้นเขตสนามบิน + กรอบคน + เส้นหางลากยาวตามก้น)
    function renderLoop() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const isMirror = (isMobile && currentFacingMode === "user") || !isMobile;

        if (isMirror) {
          ctx.save();
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          ctx.restore();
        } else {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        }

        // 🟥 วาดเส้นเขตป้องกันความปลอดภัย (Security Line)
        ctx.strokeStyle = "#ff1744";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, COUNTING_LINE_Y);
        ctx.lineTo(canvas.width, COUNTING_LINE_Y);
        ctx.stroke();
        
        ctx.fillStyle = "#ff1744";
        ctx.font = "bold 13px sans-serif";
        ctx.fillText("🛡️ เขตควบคุมความปลอดภัยสนามบิน (SECURITY CHECK LINE)", 15, COUNTING_LINE_Y - 8);

        // วาดกรอบคน และ วาดเส้นหางการเคลื่อนไหว
        for (let obj of trackedObjects) {
          let isCounted = countedIDs.has(obj.id);
          
          // 🔵 🎯 เริ่มกระบวนการวาด "เส้นหางความเคลื่อนไหว" (Motion Path Tail)
          if (obj.path && obj.path.length > 1) {
            ctx.lineWidth = 4;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            
            // วนลูปวาดเส้นเชื่อมจากจุดอดีตมาถึงจุดปัจจุบัน
            for (let j = 1; j < obj.path.length; j++) {
              // คำนวณสีไล่เฉด (ความจาง) ให้หางจางลงเรื่อยๆ ตามเวลาอดีต
              let opacity = j / obj.path.length;
              ctx.strokeStyle = `rgba(0, 229, 255, ${opacity})`; // สีฟ้าไซแอนสะท้อนแสงแบบสนามบิน
              
              ctx.beginPath();
              ctx.moveTo(obj.path[j - 1].x, obj.path[j - 1].y);
              ctx.lineTo(obj.path[j].x, obj.path[j].y);
              ctx.stroke();
            }
          }

          // วาดกรอบสี่เหลี่ยมรอบตัวคน (ถ้านับแล้วขึ้นสีแดงเข้มเพื่อความปลอดภัย ถ้ายังไม่ผ่านขึ้นสีฟ้า)
          ctx.strokeStyle = isCounted ? "#ff1744" : "#00e5ff";
          ctx.lineWidth = 3;
          ctx.strokeRect(obj.drawX, obj.drawY, obj.w, obj.h);

          // วาดแผ่นแถบป้ายข้อความหัวกรอบคน
          ctx.fillStyle = isCounted ? "#ff1744" : "#00e5ff";
          let labelText = `TARGET 🆔: ${obj.id} [HUMAN]`;
          ctx.fillRect(obj.drawX, obj.drawY - 25, labelText.length * 8.5 + 10, 25);

          // เขียนตัวหนังสือบอกเลขประจำตัว ID คันเดิมบนป้าย
          ctx.fillStyle = "#000000";
          ctx.font = "bold 13px monospace";
          ctx.fillText(labelText, obj.drawX + 5, obj.drawY - 7);
          
          // วาดจุดสีแดงกลางตัว เพื่อแสดงตำแหน่งจุดป้อนค่าเข้าเส้นหาง
          ctx.fillStyle = "#ffcc00";
          let currentDotX = obj.drawX + obj.w/2;
          ctx.beginPath();
          ctx.arc(currentDotX, obj.drawY + obj.h/2, 4, 0, 2 * Math.PI);
          ctx.fill();
        }
      }
      requestAnimationFrame(renderLoop);
    }

    function resetCounter() {
      totalHumanCount = 0;
      nextObjectID = 1;
      trackedObjects = [];
      countedIDs.clear();
      document.getElementById('humanCountDisplay').innerText = "0";
      document.getElementById('trackedObjectsDisplay').innerText = "0";
      statusElement.innerText = "เคลียร์ฐานข้อมูลความปลอดภัย เริ่มต้นนับ 0 ใหม่";
      statusElement.style.color = "#aaa";
    }

    function captureAndSend() {
      statusElement.innerText = "กำลังอัปโหลดภาพหลักฐานระบุเส้นทางเข้า Google Drive...";
      statusElement.style.color = "#007bff";
      
      const base64Image = canvas.toDataURL('image/jpeg', 0.85);
      const formBody = 'image=' + encodeURIComponent(base64Image);

      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formBody
      })
      .then(() => {
        statusElement.innerText = `📸 สำเร็จ! ภาพหลักฐานเส้นทางคน (ยอดนับปัจจุบัน: ${totalHumanCount} คน) ถูกส่งเข้าไดรฟ์เรียบร้อย`;
        statusElement.style.color = "#28a745";
      })
      .catch(err => {
        statusElement.innerText = "ส่งข้อมูลล้มเหลว: " + err.message;
        statusElement.style.color = "#dc3545";
      });
    }

    window.onload = async function() {
      checkDevice();
      try {
        const initStream = await navigator.mediaDevices.getUserMedia({video: true});
        initStream.getTracks().forEach(track => track.stop());
        getCameras();
        initAI(); 
      } catch(e) {
        initAI();
      }
    }
  </script>
</body>
</html>
