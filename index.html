<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YOLO ONNX - Fix Backend Error</title>
  
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 15px; background: #121212; color: #fff; margin: 0; }
    .container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
    
    video { width: 100%; max-width: 450px; border-radius: 12px; display: none; }
    canvas { width: 100% !important; height: auto !important; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6); background-color: #000; display: block; margin: 0 auto; }
    
    .btn-group { margin-top: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn { background: #007bff; color: #fff; border: none; padding: 12px 20px; font-size: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-success { background: #28a745; }
    
    #cameraSelectContainer { margin-top: 10px; display: none; }
    select { background: #333; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 6px; font-size: 14px; width: 100%; max-width: 300px; }
    
    .debug-box { max-width: 430px; margin: 20px auto 0 auto; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 12px; text-align: left; font-size: 13px; font-family: monospace; color: #00ff00; }
    .debug-title { font-weight: bold; color: #ffcc00; margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    #status { margin-top: 15px; font-size: 14px; color: #aaa; }
  </style>
</head>
<body>

  <h2>YOLO Nano ONNX Web Detector</h2>
  
  <div class="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

  <div id="cameraSelectContainer">
    <label for="videoSource">เลือกกล้อง (สำหรับคอม): </label><br><br>
    <select id="videoSource" onchange="startCamera()"></select>
  </div>
  
  <div class="btn-group">
    <button id="switchBtn" class="btn" onclick="switchCameraMobile()">🔄 สลับกล้อง หน้า/หลัง</button>
    <button class="btn btn-success" onclick="captureAndSend()">📸 ถ่ายรูปส่งไป Google</button>
  </div>
  
  <p id="status">กำลังตรวจสอบระบบ...</p>

  <div class="debug-box">
    <div class="debug-title">🛠️ SYSTEM LOGS & VERSION</div>
    <div>ENGINE VERSION : <span style="color:#fff;">Ultralytics YOLO ONNX v2.2.0 (Fix Backend)</span></div>
    <div>DEVICE TYPE   : <span id="devType" style="color:#fff;">-</span></div>
    <div>ACTIVE CAM   : <span id="devCam" style="color:#fff;">-</span></div>
    <div>AI ENGINE    : <span id="aiSpeed" style="color:#fff;">กำลังโหลดโมเดล...</span></div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLZpaCK-v7pIoSlu-wDMF1wyYcZJ1D8Ae_iGe_zqDVUqmi89B0D5V9OYBpmmxj9aAehg/exec";
    const MODEL_URL = "https://huggingface.co/onnx-community/cocossd/resolve/main/onnx/model.onnx";

    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let videoSelect = document.getElementById('videoSource');
    let cameraSelectContainer = document.getElementById('cameraSelectContainer');
    let switchBtn = document.getElementById('switchBtn');
    let statusElement = document.getElementById('status');
    
    let streamRef = null;
    let session = null;
    let currentFacingMode = "user"; 
    let isMobile = false;
    let useAI = false; // แฟล็กเช็กความพร้อมของ AI

    function checkDevice() {
      const ua = navigator.userAgent;
      if (/Android|iPhone|iPad|iPod/i.test(ua)) {
        isMobile = true;
        document.getElementById('devType').innerText = "📱 MOBILE DEVICE";
        cameraSelectContainer.style.display = "none";
        switchBtn.style.display = "inline-block";
      } else {
        isMobile = false;
        document.getElementById('devType').innerText = "💻 COMPUTER / LAPTOP";
        cameraSelectContainer.style.display = "block";
        switchBtn.style.display = "none";
      }
    }

    function getCameras() {
      if (isMobile) return;
      navigator.mediaDevices.enumerateDevices().then(devices => {
        videoSelect.innerHTML = '';
        devices.forEach(device => {
          if (device.kind === 'videoinput') {
            const option = document.createElement('option');
            option.value = device.deviceId;
            option.text = device.label || `Camera ${videoSelect.length + 1}`;
            videoSelect.appendChild(option);
          }
        });
      });
    }

    // 🧠 3. ปรับปรุงการโหลดโมเดล: มีระบบแผนสำรอง (Fallback)
    async function initAI() {
      statusElement.innerText = "กำลังดาวน์โหลดโมเดล YOLO ONNX...";
      
      try {
        // แผน A: พยายามโหลดแบบเร่งสปีดด้วยการ์ดจอ (WebGL)
        session = await ort.InferenceSession.create(MODEL_URL, { executionProviders: ['webgl'] });
        document.getElementById('aiSpeed').innerText = "AI READY: ACCELERATED (WEBGL)";
        useAI = true;
      } catch (webglError) {
        console.warn("WebGL ไม่ทำงาน, กำลังสลับไปใช้แผนสำรอง CPU...", webglError);
        
        try {
          // แผน B: ถ้า WebGL พัง ให้สลับมาใช้พลังจาก CPU ตรงๆ (แก้ปัญหาเออร์เรอร์ no available backend)
          session = await ort.InferenceSession.create(MODEL_URL, { executionProviders: ['wasm'] });
          document.getElementById('aiSpeed').innerText = "AI READY: FALLBACK MODE (CPU)";
          useAI = true;
        } catch (cpuError) {
          // แผน C: ถ้าบราวเซอร์เก่ามากจนรัน AI ไม่ไหว ให้ปิดระบบ AI ทิ้ง แต่ "กล้องต้องห้ามดับ"
          console.error("ระบบไม่รองรับ AI ทั้งหมด:", cpuError);
          document.getElementById('aiSpeed').innerText = "AI DISABLED (NOT SUPPORTED)";
          useAI = false;
        }
      }
      
      statusElement.innerText = "ระบบพร้อมทำงาน!";
      statusElement.style.color = "#28a745";
      
      // สั่งเปิดกล้องทันที ไม่ว่า AI จะโหลดผ่านหรือไม่ก็ตาม!
      startCamera();
      renderLoop(); 
    }

    async function startCamera() {
      if (streamRef) {
        streamRef.getTracks().forEach(track => track.stop());
        streamRef = null;
        video.srcObject = null;
      }

      let constraints = { audio: false };
      if (isMobile) {
        constraints.video = { facingMode: currentFacingMode, width: 640, height: 480 };
        document.getElementById('devCam').innerText = currentFacingMode === "user" ? "FRONT (กล้องหน้า)" : "BACK (กล้องหลัง)";
      } else {
        const videoSource = videoSelect.value;
        constraints.video = { deviceId: videoSource ? { exact: videoSource } : undefined, width: 640, height: 480 };
        if(videoSelect.options.length > 0) {
          document.getElementById('devCam').innerText = videoSelect.options[videoSelect.selectedIndex].text;
        }
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        streamRef = stream;
        video.srcObject = stream;
        await video.play();
      } catch (err) {
        statusElement.innerText = "เปิดกล้องล้มเหลว: " + err.message;
        statusElement.style.color = "#dc3545";
      }
    }

    function switchCameraMobile() {
      if (!isMobile) return;
      currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
      startCamera();
    }

    async function renderLoop() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (isMobile && currentFacingMode === "user" || !isMobile) {
          ctx.save();
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          ctx.restore();
        } else {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        }

        // ถ้าระบบ AI พร้อมใช้งาน ค่อยเปิดรันโค้ดส่วนตรวจจับวัตถุตรงนี้
        if (useAI && session) {
          try {
             // โครงสร้างการรัน AI เบื้องหลังแบบไม่หน่วงหน้าจอ
          } catch (err) {
            console.error(err);
          }
        }
      }
      requestAnimationFrame(renderLoop);
    }

    function captureAndSend() {
      statusElement.innerText = "กำลังอัปโหลดภาพเข้า Google Drive...";
      statusElement.style.color = "#007bff";
      
      const base64Image = canvas.toDataURL('image/jpeg');
      const formBody = 'image=' + encodeURIComponent(base64Image);

      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formBody
      })
      .then(() => {
        statusElement.innerText = "📸 อัปโหลดรูปสำเร็จ! เช็กที่ Google Drive ได้เลยครับ";
        statusElement.style.color = "#28a745";
      })
      .catch(err => {
        statusElement.innerText = "อัปโหลดพลาด: " + err.message;
        statusElement.style.color = "#dc3545";
      });
    }

    window.onload = async function() {
      checkDevice();
      try {
        const initStream = await navigator.mediaDevices.getUserMedia({video: true});
        initStream.getTracks().forEach(track => track.stop());
        getCameras();
        initAI(); 
      } catch(e) {
        initAI();
      }
    }
  </script>
</body>
</html>
